<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bgGlow" cx="50%" cy="80%" r="80%">
    <stop offset="0%" stop-color="#2a1a28"/>
    <stop offset="50%" stop-color="#171225"/>
    <stop offset="100%" stop-color="#0c0e1a"/>
