<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="78%" r="75%">
      <stop offset="0%" stop-color="#3b1530"/>
      <stop offset="45%" stop-color="#1c1030"/>
      <stop offset="100%" stop-color="#0d0f1e"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd24a"/>
      <stop offset="42%" stop-color="#ff8a3d"/>
      <stop offset="78%" stop-color="#ff4d2e"/>
      <stop offset="100%" stop-color="#ff2e7e"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="55%" stop-color="#ffe28a"/>
      <stop offset="100%" stop-color="#ffb13d"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bgGlow)"/>
  <!-- warm halo behind the flame -->
  <ellipse cx="256" cy="300" rx="150" ry="160" fill="#ff5e3a" opacity="0.35" filter="url(#soft)"/>
  <!-- outer flame -->
  <path fill="url(#flame)" d="M 256 88
    C 296 148, 372 198, 372 290
    C 372 368, 322 422, 256 422
    C 190 422, 140 368, 140 290
    C 140 234, 168 196, 200 164
    C 192 210, 204 238, 230 248
    C 218 198, 230 132, 256 88 Z"/>
  <!-- inner core -->
  <path fill="url(#core)" d="M 258 246
    C 282 276, 314 298, 314 342
    C 314 382, 289 408, 257 408
    C 225 408, 200 382, 200 342
    C 200 314, 214 294, 230 278
    C 226 306, 236 322, 252 326
    C 244 300, 248 270, 258 246 Z"/>
</svg>
