async function saveExerciseSets() {
  if (!EX_MODAL) return;
  const { sessionId, idx, exId, bestKg, pr1RM } = EX_MODAL;
  const session = await get('workouts', sessionId);
  session.logged_sets = (session.logged_sets || []).filter(s => !(s.ex_id === exId && s.kind !== 'cardio'));
  let setNo = 0;
  for (const r of EX_MODAL.rows) {
    const w = r.weight === '' ? null : +r.weight;
    const reps = r.reps === '' ? null : +r.reps;
    if (w == null || reps == null || isNaN(w) || isNaN(reps)) continue;
    setNo++;
    const set = { ex_id: exId, set_no: setNo, weight: w, reps, rpe: r.rpe === '' ? undefined : +r.rpe };
    if (r.type) set.type = r.type;
    session.logged_sets.push(set);
  }
  if (!session.started_at && setNo > 0) session.started_at = Date.now();
  await put('workouts', session);
  // PR detection on working sets only
  const epley = s => s.weight * (1 + s.reps / 30);
  const workSets = session.logged_sets.filter(s => s.ex_id === exId && s.weight && !s.kind && s.type !== 'w');
  if (workSets.length) {
    const newBest = Math.max(...workSets.map(s => s.weight));
    const new1RM = Math.max(...workSets.map(epley));
    if (newBest > bestKg && bestKg > 0) {
      toast(`New PR — ${fmt.num(UNITS==='imperial'?kgToLb(newBest):newBest, 1)} ${fmt.weightUnit()}`);
      fireConfetti();
      if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 120]);
    } else if (new1RM > pr1RM && pr1RM > 0) {
      toast(`New est. 1RM — ${fmt.num(UNITS==='imperial'?kgToLb(new1RM):new1RM, 1)} ${fmt.weightUnit()}`);
      fireConfetti(14);
    } else toast('Sets saved');
  } else toast('Sets saved');
  stopRestTimer();
  // Superset auto-advance: open the linked partner that still has unlogged sets
  const me = session.planned[idx];
  if (me && me.ss != null) {
    const partnerIdx = session.planned.findIndex((p, i) => i !== idx && p.ss === me.ss);
    if (partnerIdx !== -1) {
      const partner = session.planned[partnerIdx];
      const partnerLogged = session.logged_sets.filter(s => s.ex_id === partner.id && !s.kind && s.type !== 'w').length;
      if (partnerLogged < partner.sets) {
        EX_MODAL = null;
        renderWorkout();
        openExercise(sessionId, partnerIdx);
        return;
      }
    }
  }
  EX_MODAL = null;
  closeModal();
  renderWorkout();
}

// Weekly training volume per muscle (hard sets last 7 days) vs evidence-based 12-20 target
async function weeklyMuscleVolume() {
  const workouts = await getAll('workouts');
  const cutoff = daysBack(6);
  const vol = {};
  for (const w of workouts) {
    if (w.date < cutoff) continue;
    for (const s of (w.logged_sets||[])) {
      if (s.kind) continue;
      const ex = EX_BY_ID[s.ex_id];
      if (!ex) continue;
      if (s.type === 'w') continue;                                    // warm-ups don't count toward volume
      ex.primary.forEach(m => { vol[m] = (vol[m]||0) + 1; });
      (ex.secondary||[]).forEach(m => { vol[m] = (vol[m]||0) + 0.5; });   // secondary counts half (Baz-Valle 2022 convention)
    }
  }
  return vol;
}

// Plate calculator: takes a target weight in current units, returns plate breakdown per side
function openPlateCalc(exId) {
  const ex = EX_BY_ID[exId] || {};
  const rows = document.querySelectorAll('#set-rows .set-row input[data-k="weight"]');
  const lastWeight = rows.length ? parseFloat(rows[rows.length-1].value) || parseFloat(rows[0].value) : 0;
  const isImp = UNITS === 'imperial';
  const barWeight = isImp ? 45 : 20;   // standard bar weight
  const plates = isImp ? [45, 35, 25, 15, 10, 5, 2.5] : [25, 20, 15, 10, 5, 2.5, 1.25];
  openModal(`
    <header><h2>Plate calculator</h2><button class="close" onclick="closeModal()">Cancel</button></header>
    <label>Total weight (${fmt.weightUnit()})</label>
    <input type="number" step="0.5" id="pc-weight" value="${lastWeight}" oninput="updatePlateCalc(${barWeight}, [${plates.join(',')}])" />
    <label>Bar weight</label>
    <input type="number" step="0.5" id="pc-bar" value="${barWeight}" oninput="updatePlateCalc(${barWeight}, [${plates.join(',')}])" />
    <div id="pc-result" style="margin-top:14px"></div>`);
  updatePlateCalc(barWeight, plates);
}
function updatePlateCalc(defaultBar, plates) {
  const total = parseFloat(document.getElementById('pc-weight').value) || 0;
  const bar = parseFloat(document.getElementById('pc-bar').value) || defaultBar;
  const perSide = (total - bar) / 2;
  if (perSide <= 0) {
    document.getElementById('pc-result').innerHTML = `<div class="empty">Just the bar (${bar} ${fmt.weightUnit()})</div>`;
    return;
  }
  let remain = perSide;
  const breakdown = [];
  for (const p of plates) {
    const n = Math.floor(remain / p);
    if (n > 0) { breakdown.push({ p, n }); remain -= n * p; }
  }
  const visualHTML = breakdown.map(b => {
    const widthPx = Math.max(8, Math.min(60, b.p * 1.2));
    const colors = { 45:'#dc2626', 35:'#1e40af', 25:'#16a34a', 20:'#16a34a', 15:'#facc15', 10:'#fff', 5:'#1f2937', '2.5':'#dc2626', '1.25':'#1e40af' };
    const color = colors[b.p] || '#7aa8ff';
    return `<div style="display:inline-block;width:${widthPx}px;height:${widthPx*1.4}px;background:${color};border-radius:4px;margin-right:3px;vertical-align:middle;border:1px solid rgba(255,255,255,0.2);position:relative">${b.n > 1 ? `<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:${b.p===10||b.p===15?'#000':'#fff'};text-shadow:0 0 2px rgba(0,0,0,0.5)">${b.n}</span>` : ''}</div>`;
  }).join('');
  document.getElementById('pc-result').innerHTML = `
    <div class="card" style="margin:0">
      <div class="muted text-sm">Per side</div>
      <div class="text-xl num" style="margin-bottom:8px">${fmt.num(perSide, 1)} ${fmt.weightUnit()}</div>
      <div style="margin-bottom:8px">${visualHTML}</div>
      <div class="muted text-sm">${breakdown.map(b => `${b.n}× ${b.p}`).join(' + ') || '—'}${remain > 0.1 ? ` <span class="pill warn">${fmt.num(remain,1)} ${fmt.weightUnit()} short</span>` : ''}</div>
    </div>`;
}

async function finishWorkout(sessionId) {
  const s = await get('workouts', sessionId);
  const plannedSets = (s.planned||[]).reduce((a,e)=>a+e.sets,0);
  const loggedNonCardio = (s.logged_sets||[]).filter(x=>!x.kind).length;
  const cardioCount = (s.logged_sets||[]).filter(x=>x.kind==='cardio').length;
  const ok = plannedSets ? (loggedNonCardio >= 0.8 * plannedSets) : (cardioCount > 0);
  if (!ok && !confirm(`Only ${loggedNonCardio}/${plannedSets} sets logged. Mark complete anyway?`)) return;
  s.completed = true;
  if (s.started_at) {
    const mins = Math.round((Date.now() - s.started_at) / 60000);
    if (mins > 0 && mins < 360) s.duration_min = mins;
  }
  await put('workouts', s);
  if (navigator.vibrate) navigator.vibrate([30, 30, 50]);
  toast('✓ Session complete');

let MICRO_VIEW = 'today';   // 'today' | 'week'
function setMicroView(v) { MICRO_VIEW = v; renderFood(); }
function microPanelHTML(todayMeals, allMeals, profile) {
  const sex = profile?.sex || 'male';
  let micro, withData, totalMeals, label;
  if (MICRO_VIEW === 'week') {
    // average of daily sums over the last 7 days that have any meals
    const days = {};
    for (let i = 0; i < 7; i++) days[daysBack(i)] = [];
    allMeals.forEach(m => { if (days[m.date]) days[m.date].push(m); });
    const dayList = Object.values(days).filter(list => list.length);
    const daySums = dayList.map(list => sumMicros(list.map(m => m.micro))).filter(Boolean);
    micro = {};
    if (daySums.length) {
      for (const def of MICROS) {
        const vals = daySums.map(s => s[def.k]).filter(v => v != null);
        if (vals.length) micro[def.k] = vals.reduce((a,b)=>a+b,0) / daySums.length;
      }
    }
    withData = allMeals.filter(m => m.date >= daysBack(6) && m.micro).length;
    totalMeals = allMeals.filter(m => m.date >= daysBack(6)).length;
    label = '7-day average';
  } else {
    micro = sumMicros(todayMeals.map(m => m.micro)) || {};
    withData = todayMeals.filter(m => m.micro).length;
    totalMeals = todayMeals.length;
    label = 'today';
  }
  const rows = MICROS.map(def => {
    const v = micro[def.k];
    const target = microTarget(def, sex);
    const pct = v != null ? (v / target) * 100 : 0;
    const isLimit = def.type === 'limit';
    const barCls = v == null ? '' : isLimit ? (pct > 100 ? 'bad' : pct > 75 ? 'warn' : 'good') : (pct >= 100 ? 'good' : '');
    const disp = v == null ? '—' : v >= 100 ? Math.round(v) : fmt.num(v, 1);
    return `<div style="margin:7px 0">
      <div class="row between" style="margin-bottom:3px">
        <span class="text-sm">${def.label}${isLimit ? ' <span class="muted" style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px">limit</span>' : ''}</span>
        <span class="muted num text-sm">${disp} / ${target >= 100 ? Math.round(target) : target} ${def.unit}${v != null ? ` · ${Math.round(pct)}%` : ''}</span>
      </div>
      <div class="progress ${barCls}" style="height:4px"><span style="width:${Math.min(100, pct)}%"></span></div>
    </div>`;
  }).join('');
  return `<details class="card">
    <summary style="cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center">
      <h3 style="margin:0">Micronutrients</h3>
      <span class="muted text-sm">${totalMeals ? `${withData}/${totalMeals} meals have data` : 'log to populate'}</span>
    </summary>
    <div class="segments" style="margin:12px 0 4px">
      <button class="${MICRO_VIEW==='today'?'active':''}" onclick="event.preventDefault();setMicroView('today')">Today</button>
      <button class="${MICRO_VIEW==='week'?'active':''}" onclick="event.preventDefault();setMicroView('week')">7-day avg</button>
    </div>
    <p class="muted text-sm" style="margin:6px 0 10px">Targets: NIH RDA/AI for ${sex === 'female' ? 'adult women' : 'adult men'} (${label}). Barcode + USDA + photo entries carry micro data; quick-adds don't.</p>
    ${rows}
  </details>`;
}

let SEARCH_RESULT_MAP = {};          // id -> food object from the latest rendered search
let _offCache = {};                  // query -> OFF results (session cache)
let _offAbort = null;
let _offDebounce = null;
function offProductToFood(prod) {
  const nutr = prod.nutriments || {};
  const kcal = nutr['energy-kcal_100g'] || (nutr['energy_100g'] ? nutr['energy_100g'] / 4.184 : 0) || 0;
  const brand = (prod.brands || '').split(',')[0].trim();
  const name = (prod.product_name || '').trim();
  if (!name || !kcal) return null;
  return {
    id: 'off_' + prod.code,
    name: brand && !name.toLowerCase().includes(brand.toLowerCase()) ? `${name} (${brand})` : name,
    serving_g: 100,
    kcal: Math.round(kcal),
    p: nutr.proteins_100g || 0,
    c: nutr.carbohydrates_100g || 0,
    f: nutr.fat_100g || 0,
    micro: offMicros(nutr),
    barcode: prod.code,
    src: 'off',
  };
}
async function searchOFF(q) {
  const key = q.toLowerCase().trim();
  if (_offCache[key]) return _offCache[key];
  if (_offAbort) _offAbort.abort();
  _offAbort = new AbortController();
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=12&sort_by=unique_scans_n&fields=code,product_name,brands,nutriments`;
  const r = await fetch(url, { signal: _offAbort.signal });
  if (!r.ok) throw new Error('OFF search failed');
  const data = await r.json();
  const out = (data.products || []).map(offProductToFood).filter(Boolean);
  _offCache[key] = out;
  return out;
}

async function searchMealBuilderFoods(q) {
  const el = document.getElementById('mb-results'); if (!el) return;
  const lc = (q||'').toLowerCase().trim();
  const favs = await getFavFoods();
  const favNames = new Set(favs.map(f => f.name));
  let locals;
  if (lc) locals = await localFoodMatches(q);
  else {
    const custom = await getAll('custom_foods');
    locals = [...favs.map((f,i)=>({...f, id:'fav_'+i})), ...FOOD_DB.slice(0,10), ...custom.slice(0,4).map(c=>({...c, id:'cust_'+c.id}))].slice(0, 14);
  }
  registerResults(locals);
  el.innerHTML = locals.map(f => foodRowHTML(f, 'pickMealBuilderFood', favNames)).join('') || (lc ? '<div class="empty">Searching online…</div>' : '');
  // Online search (debounced)
  if (lc.length >= 3 && navigator.onLine) {
    clearTimeout(_offDebounce);
    _offDebounce = setTimeout(async () => {
      const [offR, fdcR] = await Promise.allSettled([searchOFF(q), searchFDC(q)]);
      const cur = document.getElementById('mb-search');
      if (!cur || cur.value.toLowerCase().trim() !== lc) return;   // stale
      const seen = new Set(locals.map(l => l.name.toLowerCase()));
      const dedupe = list => list.filter(o => !seen.has(o.name.toLowerCase()) && (seen.add(o.name.toLowerCase()), true));
      const fresh = [...(offR.status === 'fulfilled' ? dedupe(offR.value) : []), ...(fdcR.status === 'fulfilled' ? dedupe(fdcR.value) : [])];
      registerResults(fresh);
      if (fresh.length) el.innerHTML = (locals.length ? locals.map(f => foodRowHTML(f, 'pickMealBuilderFood', favNames)).join('') : '') +
        `<div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin:10px 0 2px">Online results</div>` +
        fresh.map(f => foodRowHTML(f, 'pickMealBuilderFood', favNames)).join('');
      else if (!locals.length) el.innerHTML = '<div class="empty">No match — try Quick add</div>';
    }, 350);
  } else if (lc && !locals.length) {
    el.innerHTML = '<div class="empty">No match — type ≥3 letters for online search</div>';
  }
}

async function startBarcodeScan() {
  const status = document.getElementById('bc-status');
  status.textContent = 'Requesting camera…';
  _scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  const video = document.getElementById('bc-video');
  video.srcObject = _scanStream;
  await video.play();
  status.textContent = 'Point at a barcode…';
  // Try native BarcodeDetector first
  if ('BarcodeDetector' in window) {
    const det = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code'] });
    _scanLoop(video, det, status);
  } else {
    // Fallback: lazy-load ZXing
    status.textContent = 'Loading scanner library…';
    try {
      await loadZXing();
      const reader = new window.ZXing.BrowserMultiFormatReader();
      reader.decodeFromVideoDevice(null, video, (result) => {
        if (result) { stopBarcodeScan(); lookupBarcode(result.getText()); }
      });
      status.textContent = 'Point at a barcode…';
    } catch (e) {
      status.innerHTML = `<span style="color:var(--bad)">Scanner unavailable. Enter barcode manually below.</span>`;
    }
  }
}
async function _scanLoop(video, det, status) {
  if (!_scanStream) return;
  try {
    const barcodes = await det.detect(video);
    if (barcodes.length) {
      stopBarcodeScan();
      lookupBarcode(barcodes[0].rawValue);
      return;
    }
  } catch (e) {}
  setTimeout(() => _scanLoop(video, det, status), 250);
}
function stopBarcodeScan() {
  if (_scanStream) { _scanStream.getTracks().forEach(t => t.stop()); _scanStream = null; }
}
let _zxingPromise;
function loadZXing() {
  if (_zxingPromise) return _zxingPromise;
  _zxingPromise = new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/@zxing/library@0.21.0/umd/index.min.js';
    s.onload = () => window.ZXing ? res() : rej(new Error('ZXing load failed'));
    s.onerror = () => rej(new Error('ZXing CDN failed'));
    document.head.appendChild(s);
  });
  return _zxingPromise;
}
async function lookupBarcode(code) {
  if (!code) return;
  const status = document.getElementById('bc-status');
  if (status) status.textContent = `Looking up ${code}…`;
  let food = null;
  // 1) Open Food Facts (global, label-sourced)
  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json`);
    const data = await r.json();
    if (data.status === 1) {
      const prod = data.product;
      const nutr = prod.nutriments || {};
      const kcal = nutr['energy-kcal_100g'] || (nutr['energy_100g'] ? nutr['energy_100g'] / 4.184 : 0) || 0;
      if (kcal > 0) {
        food = {
          id: 'bc_' + code,
          name: prod.product_name || prod.product_name_en || prod.generic_name || `Barcode ${code}`,
          serving_g: 100, kcal,
          p: nutr.proteins_100g || 0, c: nutr.carbohydrates_100g || 0, f: nutr.fat_100g || 0,
          micro: offMicros(nutr), barcode: code, src: 'off',
        };
      }
    }
  } catch (e) { /* fall through to USDA */ }
  // 2) USDA FoodData Central (best US branded coverage)
  if (!food) {
    if (status) status.textContent = `Not in Open Food Facts — trying USDA…`;
    try { food = await fdcLookupBarcode(code); } catch (e) {}
    if (food) { food.id = 'bc_' + code; food.barcode = food.barcode || code; }
  }
  if (!food) {
    if (status) status.innerHTML = `<span style="color:var(--bad)">Not found in Open Food Facts or USDA.</span> Snap the nutrition label with the AI tab, or use Quick add.`;
    return;
  }
  await cacheOnlineFood(food);
  WEIGH_PICK_FOOD = food;
  closeModal();
  renderAddFood();
  setTimeout(() => {
    const el = document.getElementById('weigh-search');
    if (el) el.value = food.name;
    updateWeighPreview();
  }, 50);
  toast(`Found: ${food.name}${food.src === 'fdc' ? ' (USDA)' : ''}`);

const AI_MODELS = { fast: 'claude-haiku-4-5-20251001', smart: 'claude-sonnet-4-6' };
async function aiAvailable() { return !!(await getSetting('anthropic_key')); }
async function aiCall(content, { system, maxTokens = 1500, smart = false } = {}) {
  const key = await getSetting('anthropic_key');
  if (!key) throw new Error('No API key set. Add one in More → AI features.');
  if (!navigator.onLine) throw new Error('You are offline — AI features need internet.');
  const model = (await getSetting('ai_model_pref', 'fast')) === 'smart' || smart ? AI_MODELS.smart : AI_MODELS.fast;
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model, max_tokens: maxTokens, ...(system ? { system } : {}), messages: [{ role: 'user', content }] }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    if (r.status === 401) throw new Error('API key invalid — check it in More → AI features.');
    if (r.status === 429) throw new Error('Rate limited — wait a minute and retry.');
    throw new Error(err?.error?.message || `API error ${r.status}`);
  }
  const data = await r.json();
  return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
}
function extractJSON(text) {
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('AI returned no JSON');
  return JSON.parse(m[0]);
}

// -------- Health-data bridge (Fitbit Air → Apple Health → iOS Shortcut → Lean) --------
// Receives device metrics via URL fragment:  #hd=w:152.2,rhr:55,hrv:62,sleep:7.5,steps:9500,spo2:97,u:lb
// Easy to emit from an iOS Shortcut Text action. Manual entries always win; bridge fills gaps.
async function handleHashData() {
  if (!location.hash || !location.hash.startsWith('#hd=')) return false;
  const raw = decodeURIComponent(location.hash.slice(4));
  history.replaceState(null, '', location.pathname + location.search);   // consume
  const fields = {};
  raw.split(/[,;]/).forEach(pair => {
    const [k, v] = pair.split(':').map(s => (s || '').trim());
    if (k && v !== undefined && v !== '') fields[k.toLowerCase()] = parseFloat(v) || v;
  });
  const today_ = today();
  const imported = [];
  // Weight (unit-aware)
  if (isFinite(fields.w)) {
    const kg = (fields.u === 'kg') ? fields.w : lbToKg(fields.w);
    if (kg > 30 && kg < 250) {
      const weights = await getAll('weights');
      if (!weights.some(x => x.date === today_)) {
        await put('weights', { date: today_, kg, source: 'bridge' });
        imported.push('weight');
      }
    }
  }
  // Biometrics (fill-only)
  const bio = await getAll('biometrics');
  const ent = bio.find(b => b.date === today_) || { date: today_ };
  const map = [['rhr','rhr',25,130],['hrv','hrv_rmssd',5,300],['sleep','sleep_hours',0,16],['spo2','spo2',70,100],
               ['readiness','readiness',0,100],['stress','stress_score',0,100],['skintemp','skin_temp_delta',-5,5],
               ['deepsleep','deep_sleep_h',0,8],['remsleep','rem_sleep_h',0,8],['bf','bf_pct',3,60]];
  let bioChanged = false;
  for (const [src, dst, lo, hi] of map) {
    const v = fields[src];
    if (isFinite(v) && v >= lo && v <= hi && ent[dst] == null) { ent[dst] = v; bioChanged = true; imported.push(src); }
  }
  if (bioChanged) await put('biometrics', ent);
  // Steps
  if (isFinite(fields.steps) && fields.steps > 0 && fields.steps < 120000) {
    const steps = await getAll('steps');
    if (!steps.some(s => s.date === today_)) {
      await put('steps', { date: today_, count: Math.round(fields.steps) });
      imported.push('steps');
    }
  }
  if (imported.length) {
    toast(`Synced from device: ${imported.join(', ')}`);
    if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
  } else {
    toast('Bridge data received — today already logged');
  }
  return true;
}

  const cid = (await getSetting('spotify_client_id', '')).trim();
  try {
    const r = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ grant_type: 'authorization_code', code, redirect_uri: location.origin + location.pathname, client_id: cid, code_verifier: localStorage.getItem('sp_verifier') || '' }),
    });
    if (!r.ok) throw new Error('Token exchange failed');
    const t = await r.json();
    await setSetting('spotify_tokens', { at: t.access_token, rt: t.refresh_token, exp: Date.now() + (t.expires_in - 60) * 1000 });
    toast('Spotify connected');
  } catch (e) { toast('Spotify connect failed — check Client ID + redirect URI'); }
  localStorage.removeItem('sp_verifier'); localStorage.removeItem('sp_state');
  return true;
}
async function spotifyToken() {
  let tok = await getSetting('spotify_tokens');
  if (!tok) return null;
  if (Date.now() > tok.exp) {
    const cid = (await getSetting('spotify_client_id', '')).trim();
    try {
      const r = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: tok.rt, client_id: cid }),
      });
      if (!r.ok) throw new Error('refresh failed');
      const t = await r.json();
      tok = { at: t.access_token, rt: t.refresh_token || tok.rt, exp: Date.now() + (t.expires_in - 60) * 1000 };
      await setSetting('spotify_tokens', tok);
    } catch (e) { await setSetting('spotify_tokens', null); return null; }
  }
  return tok.at;
}
async function spotifyAPI(path, method = 'GET') {
  const at = await spotifyToken();
  if (!at) throw new Error('not-connected');
  const r = await fetch('https://api.spotify.com/v1' + path, { method, headers: { Authorization: 'Bearer ' + at } });
  if (r.status === 204) return null;
  if (r.status === 403) throw new Error('premium');
  if (r.status === 404) throw new Error('no-device');
  if (!r.ok) throw new Error('spotify-' + r.status);
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}
async function spotifyControl(action) {
  try {
    if (action === 'next') await spotifyAPI('/me/player/next', 'POST');
    else if (action === 'prev') await spotifyAPI('/me/player/previous', 'POST');
    else {
      const state = await spotifyAPI('/me/player');
      if (state && state.is_playing) await spotifyAPI('/me/player/pause', 'PUT');
      else await spotifyAPI('/me/player/play', 'PUT');
    }
    setTimeout(refreshNowPlaying, 600);
  } catch (e) {
    if (e.message === 'premium') toast('Playback control needs Spotify Premium');
    else if (e.message === 'no-device') toast('Start playing in the Spotify app first');
    else toast('Spotify unavailable');
  }
}

async function generateAIProgram() {
  const status = document.getElementById('pg-status');
  const btn = document.getElementById('pg-go');
  if (!(await aiAvailable())) { status.innerHTML = 'Needs an API key — set up in More → AI features'; return; }
  const days = parseInt(document.getElementById('pg-days').value);

  btn.disabled = true; status.textContent = 'Designing your program… (~10s)';
  const catalog = EXERCISES.map(e => `${e.id}|${e.primary.join('+')}|${e.equip}`).join('\n');

`Design a ${days}-day/week resistance program. Goal: ${goal}. ${notes ? 'User notes: ' + notes + '.' : ''}
Rules: 12-20 weekly sets per major muscle (count secondary as half), compounds first, 4-7 exercises/day, reps as ranges like "5-8"/"8-12"/"12-15", rir 1-3. Use ONLY these exercise ids (id|muscles|equipment):

Respond with ONLY JSON:

Every non-rest key in week must exist in labels and plans. Spread training days sensibly across the week.` }],
      { maxTokens: 2500, smart: true });
    const prog = extractJSON(out);
    // Validate hard before accepting
    if (!prog.week || prog.week.length !== 7) throw new Error('Bad week structure');
    const keys = [...new Set(prog.week.filter(k => k !== 'rest'))];
    if (!keys.length || keys.length > days) throw new Error('Bad day count');
    for (const k of keys) {
      if (!prog.plans?.[k] || !Array.isArray(prog.plans[k]) || !prog.plans[k].length) throw new Error(`Missing plan for ${k}`);
      for (const e of prog.plans[k]) {
        if (!EX_BY_ID[e.id]) throw new Error(`Unknown exercise: ${e.id}`);
        e.sets = clamp(parseInt(e.sets) || 3, 1, 6);
        e.rir = clamp(parseInt(e.rir) ?? 2, 0, 4);
        if (typeof e.reps !== 'string') e.reps = '8-12';
      }
    }
    prog.labels = prog.labels || {};
    prog.labels.rest = prog.labels.rest || 'Rest / Cardio';
    keys.forEach(k => { if (!prog.labels[k]) prog.labels[k] = k; });
    const id = 'ai_' + Date.now().toString(36);
    const final = { id, name: prog.name || 'My AI program', desc: prog.desc || `${days} days · AI-generated`, days, week: prog.week, labels: prog.labels, plans: prog.plans, ai: true };

  } catch (e) {
    status.innerHTML = `<span style="color:var(--bad)">${e.message} — try again</span>`;
    btn.disabled = false;
  }

    return `<div class="list-row" onclick="pickWeighFood('${f.id}')" style="cursor:pointer;${picked?'background:rgba(122,168,255,0.1);border-radius:8px;padding:8px':''}">
      <div style="flex:1;min-width:0"><div class="name">${f.name}${f.src==='off'?'<span class="src-badge off">OFF</span>':''}${f.src==='fdc'?'<span class="src-badge usda">USDA</span>':''}${favNames.has(f.name)?'<span class="src-badge fav">★</span>':''}</div>
      <div class="sub num">100g: ${Math.round(f.kcal)} kcal · P${fmt.num(f.p,1)} C${fmt.num(f.c,1)} F${fmt.num(f.f,1)}</div></div>
      <button class="fav-star ${favNames.has(f.name)?'on':''}" onclick="event.stopPropagation();toggleFavFood('${f.id}')" aria-label="Favorite">★</button>
      ${picked?'<span class="pill good">picked</span>':'<button class="add">Pick</button>'}
    </div>`;
  };
  el.innerHTML = locals.map(rowFor).join('') || (lc ? `<div class="empty">${navigator.onLine && lc.length>=3 ? 'Searching online…' : 'No local match — try Quick add'}</div>` : '');
  // Online (Open Food Facts) — debounced, appended under local results
  if (lc.length >= 3 && navigator.onLine) {
    clearTimeout(_offDebounce);
    _offDebounce = setTimeout(async () => {
      const [offR, fdcR] = await Promise.allSettled([searchOFF(q), searchFDC(q)]);
      const cur = document.getElementById('weigh-search');
      if (!cur || cur.value.toLowerCase().trim() !== lc) return;   // stale query
      const seen = new Set(locals.map(l => l.name.toLowerCase()));
      const dedupe = list => list.filter(o => !seen.has(o.name.toLowerCase()) && (seen.add(o.name.toLowerCase()), true));
      const off = offR.status === 'fulfilled' ? dedupe(offR.value) : [];
      const fdc = fdcR.status === 'fulfilled' ? dedupe(fdcR.value) : [];
      registerResults([...off, ...fdc]);
      const box = document.getElementById('weigh-results');
      if (!box) return;
      const section = (title, list) => list.length ? `<div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin:10px 0 2px">${title}</div>` + list.map(rowFor).join('') : '';
      if (off.length || fdc.length) box.innerHTML = locals.map(rowFor).join('') + section('Open Food Facts', off) + section('USDA', fdc);
      else if (!locals.length) box.innerHTML = '<div class="empty">No match anywhere — try Quick add</div>';
    }, 350);
  }
}

let FOOD_IMPORT_PARSED;
function parseFoodCSV() {
  const text = document.getElementById('if-text').value.trim();
  if (!text) return;
  // Detect delimiter
  const first = text.split('\n')[0];
  const delim = first.includes('\t') ? '\t' : first.includes(';') ? ';' : ',';
  const rows = text.split(/\r?\n/).filter(r => r.trim()).map(r => r.split(delim).map(c => c.trim().replace(/^"|"$/g, '')));
  if (rows.length < 2) return toast('Need header + at least 1 row');
  const header = rows[0].map(h => h.toLowerCase());
  const data = rows.slice(1);
  // Map columns
  const cols = {
    date: ['date','day','timestamp','datum'],
    time: ['time','meal time'],
    meal_type: ['meal','meal type','meal name','category'],
    food: ['food','food name','name','item','product','description'],
    serving_g: ['weight','weight (g)','grams','serving','serving (g)','amount','quantity (g)','quantity'],
    kcal: ['calories','kcal','energy','energy (kcal)','cal'],
    p: ['protein','protein (g)','prot','p (g)'],
    c: ['carbs','carbohydrate','carbohydrates','carb (g)','carbs (g)','c (g)'],
    f: ['fat','fat (g)','f (g)','fats'],
    fiber: ['fiber','fibre','fiber (g)'],
  };
  const idx = {};
  for (const [k, names] of Object.entries(cols)) {
    for (const n of names) { const i = header.indexOf(n); if (i !== -1) { idx[k] = i; break; } }
  }
  if (idx.kcal == null && idx.food == null) return toast('Need at least Calories or Food columns');
  const parsed = [];
  for (const r of data) {
    const rec = {};
    if (idx.date != null && r[idx.date]) { const d = parseDate(r[idx.date]); if (d) rec.date = d; }
    if (!rec.date) rec.date = today();
    if (idx.food != null && r[idx.food]) rec.name = r[idx.food];
    if (idx.serving_g != null && r[idx.serving_g]) rec.serving_g = parseFloat(r[idx.serving_g]);
    if (idx.kcal != null && r[idx.kcal]) rec.kcal = parseFloat(r[idx.kcal]);
    if (idx.p != null && r[idx.p]) rec.p = parseFloat(r[idx.p]);
    if (idx.c != null && r[idx.c]) rec.c = parseFloat(r[idx.c]);
    if (idx.f != null && r[idx.f]) rec.f = parseFloat(r[idx.f]);
    if (idx.meal_type != null && r[idx.meal_type]) rec.meal_type = r[idx.meal_type];
    if (rec.kcal && !isNaN(rec.kcal)) parsed.push(rec);
  }
  FOOD_IMPORT_PARSED = parsed;
  const totalKcal = parsed.reduce((a,r)=>a+(r.kcal||0),0);
  document.getElementById('if-preview').innerHTML = `
    <div class="card" style="margin:0">
      <h3>Preview · ${parsed.length} entries · ${Math.round(totalKcal)} kcal total</h3>
      <div style="max-height:240px;overflow-y:auto">
        ${parsed.slice(0, 30).map(r => `<div class="list-row"><div><div class="name">${r.name || 'Unnamed'} ${r.serving_g?`<span class="muted">(${r.serving_g}g)</span>`:''}</div><div class="sub num">${fmt.dateNice(r.date)} · ${Math.round(r.kcal)} kcal${r.p?' · P'+fmt.num(r.p,1):''}${r.c?' · C'+fmt.num(r.c,1):''}${r.f?' · F'+fmt.num(r.f,1):''}</div></div></div>`).join('')}
        ${parsed.length > 30 ? `<div class="muted text-sm" style="margin-top:8px">… + ${parsed.length - 30} more</div>` : ''}
      </div>
      <div style="height:12px"></div>
      <button class="btn full gradient" onclick="confirmFoodImport()">Import ${parsed.length} entries</button>
    </div>`;
}

function setBodyTab(t) { BODY_TAB = t; renderBody(); }
let TREND_VIEW = 'weight';

// Big BF% ring — shows current BF% in center, progress arc from start to goal
function bigRing(bf, progress, startBF, goalBF) {
  const r = 90;
  const cx = 110, cy = 110;
  const c = 2 * Math.PI * r;
  const filled = c * (progress || 0);
  // Color: green if making good progress, blue if some, gray if none
  const gradId = 'bigring-' + Math.random().toString(36).slice(2,8);
  return `<div class="big-ring-wrap">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff9d2e"/>
          <stop offset="50%" stop-color="#ff5e1f"/>
          <stop offset="100%" stop-color="#ff3d00"/>
        </linearGradient>
      </defs>
      <!-- Background ring -->
      <circle cx="${cx}" cy="${cy}" r="${r}" style="stroke:var(--ring-track)" stroke-width="14" fill="none"/>
      <!-- Progress arc -->
      <circle cx="${cx}" cy="${cy}" r="${r}" stroke="url(#${gradId})" stroke-width="14" fill="none"
        stroke-dasharray="${filled} ${c}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})"
        style="transition: stroke-dasharray 0.6s ease-out"/>
      <!-- Center text -->
      <text x="${cx}" y="${cy-6}" text-anchor="middle" style="fill:var(--text);font-size:54px;font-weight:700;letter-spacing:-2px;font-family:inherit;font-variant-numeric:tabular-nums">${bf!=null?fmt.num(bf,1):'—'}</text>
      <text x="${cx}" y="${cy+22}" text-anchor="middle" style="fill:var(--muted);font-size:14px;font-weight:600;letter-spacing:1.5px;font-family:inherit">% BODY FAT</text>
      ${bf!=null && progress!=null ? `<text x="${cx}" y="${cy+44}" text-anchor="middle" style="fill:var(--muted-2);font-size:11px;font-weight:500;letter-spacing:0.5px;font-family:inherit">${Math.round(progress*100)}% to goal</text>` : ''}
    </svg>
  </div>`;
}

// Weight-progress ring — when no scale data, show progress from start → current → goal weight
function weightRing(curKg, progress, p) {
  const r = 90;
  const cx = 110, cy = 110;
  const c = 2 * Math.PI * r;
  const filled = c * (progress || 0);
  const gradId = 'wring-' + Math.random().toString(36).slice(2,8);
  const lostDisp = fmt.weight(Math.max(0, p.weight_kg_start - curKg));
  return `<div class="big-ring-wrap">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff9d2e"/>
          <stop offset="50%" stop-color="#ff5e1f"/>
          <stop offset="100%" stop-color="#ff3d00"/>
        </linearGradient>
      </defs>
      <circle cx="${cx}" cy="${cy}" r="${r}" style="stroke:var(--ring-track)" stroke-width="14" fill="none"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" stroke="url(#${gradId})" stroke-width="14" fill="none"
        stroke-dasharray="${filled} ${c}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})"
        style="transition: stroke-dasharray 0.6s ease-out"/>
      <text x="${cx}" y="${cy-12}" text-anchor="middle" style="fill:var(--text);font-size:42px;font-weight:700;letter-spacing:-1.2px;font-family:inherit;font-variant-numeric:tabular-nums">${fmt.num(fmt.weightNum(curKg),1)}</text>
      <text x="${cx}" y="${cy+12}" text-anchor="middle" style="fill:var(--muted);font-size:13px;font-weight:600;letter-spacing:1.5px;font-family:inherit">${fmt.weightUnit().toUpperCase()}</text>
      <text x="${cx}" y="${cy+36}" text-anchor="middle" style="fill:var(--text-2);font-size:12px;font-weight:600;letter-spacing:0.5px;font-family:inherit">${Math.round(progress*100)}% to goal</text>
      <text x="${cx}" y="${cy+52}" text-anchor="middle" style="fill:var(--muted-2);font-size:10px;font-weight:500;letter-spacing:0.3px;font-family:inherit">${lostDisp} lost so far</text>
    </svg>
  </div>`;
}

// Composition split bar: visualizes weight = lean + fat + bone
function compositionBar(leanKg, fatKg, boneKg) {
  const bone = boneKg || 0;
  const total = leanKg + fatKg + bone;
  if (!total) return '';
  const leanPct = (leanKg / total) * 100;
  const fatPct = (fatKg / total) * 100;
  const bonePct = (bone / total) * 100;
  return `<div class="comp-bar">
    <div class="comp-segment lean" style="width:${leanPct}%" title="Lean ${fmt.num(leanPct,1)}%"></div>
    <div class="comp-segment fat" style="width:${fatPct}%" title="Fat ${fmt.num(fatPct,1)}%"></div>
    ${bone ? `<div class="comp-segment bone" style="width:${bonePct}%" title="Bone ${fmt.num(bonePct,1)}%"></div>` : ''}
  </div>
  <div class="row" style="gap:14px;margin-top:10px;justify-content:center;flex-wrap:wrap">
    <span class="comp-legend"><span class="comp-dot lean"></span>Lean ${fmt.num(leanPct,1)}%</span>
    <span class="comp-legend"><span class="comp-dot fat"></span>Fat ${fmt.num(fatPct,1)}%</span>

async function addPhoto(e) {
  const file = e.target.files[0]; if (!file) return;
  // Resize to max 1024px on long edge for storage efficiency
  const blob = await resizeImage(file, 1024);
  await put('progress_photos', { date: today(), blob, created: Date.now() });

function resizeImage(file, maxSize) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      if (width > maxSize || height > maxSize) {
        if (width > height) { height *= maxSize / width; width = maxSize; }
        else { width *= maxSize / height; height = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/jpeg', 0.85);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function lineChart(data, opts={}) {
  if (data.length < 2) return '';
  const W = 340, H = 180, PL = 36, PR = 12, PT = 14, PB = 26;
  const allY = [...data.map(d=>d.value), ...(opts.targetLine!=null?[opts.targetLine]:[])];
  const yMin = Math.floor((Math.min(...allY) - 0.5)*10)/10;
  const yMax = Math.ceil((Math.max(...allY) + 0.5)*10)/10;
  const sx = i => PL + (i/(data.length-1)) * (W-PL-PR);
  const sy = v => PT + (1 - (v-yMin)/(yMax-yMin)) * (H-PT-PB);
  const linePath = data.map((d,i)=>`${i===0?'M':'L'}${sx(i)},${sy(d.value)}`).join(' ');
  const areaPath = `${linePath} L ${sx(data.length-1)},${H-PB} L ${sx(0)},${H-PB} Z`;
  const reg = opts.showReg ? linReg(data.map((d,i)=>({x:i, y:d.value}))) : null;
  const regD = reg ? `M${sx(0)},${sy(reg.intercept)} L${sx(data.length-1)},${sy(reg.intercept + reg.slope*(data.length-1))}` : '';
  const targetD = opts.targetLine!=null ? `M${sx(0)},${sy(data[0].value)} L${sx(data.length-1)},${sy(opts.targetLine)}` : '';
  const dots = data.map((d,i)=>`<circle class="dot" cx="${sx(i)}" cy="${sy(d.value)}" r="3"/><circle cx="${sx(i)}" cy="${sy(d.value)}" r="11" fill="transparent" style="cursor:pointer" onclick="showChartTip(event, '${fmt.num(d.value,1)}${opts.yLabel?' '+opts.yLabel:''}', '${fmt.dateNice(d.date).replace(/'/g,'')}')"/>`).join('');
  const yL = [yMin, (yMin+yMax)/2, yMax].map(v=>`<text x="2" y="${sy(v)+3}">${fmt.num(v,1)}</text>`).join('');
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line class="grid" x1="${PL}" y1="${sy(yMax)}" x2="${W-PR}" y2="${sy(yMax)}"/>
    <line class="grid" x1="${PL}" y1="${sy((yMin+yMax)/2)}" x2="${W-PR}" y2="${sy((yMin+yMax)/2)}"/>
    <line class="grid" x1="${PL}" y1="${sy(yMin)}" x2="${W-PR}" y2="${sy(yMin)}"/>
    <path class="area" d="${areaPath}"/>
    ${targetD?`<path class="target" d="${targetD}"/>`:''}
    ${regD?`<path class="reg" d="${regD}"/>`:''}
    <path class="line" d="${linePath}"/>${dots}${yL}
    <text x="${PL}" y="${H-6}">${fmt.dateNice(data[0].date)}</text>
    <text x="${W-PR-60}" y="${H-6}">${fmt.dateNice(data[data.length-1].date)}</text>
  </svg>
  <div class="muted text-sm" style="margin-top:6px;display:flex;gap:14px;flex-wrap:wrap"><span><span style="color:var(--accent)">●</span> data</span>${opts.showReg?'<span><span style="color:var(--accent-3)">- -</span> trend</span>':''}${opts.targetLine!=null?'<span><span style="color:var(--good)">- -</span> target</span>':''}</div>`;
}

// -------- Apple Health import (export.zip / export.xml, streamed) --------
// Handles the full Apple Health export: weight, BF%, RHR, HRV, sleep stages, steps, SpO2.
// Streams the file in chunks so even multi-hundred-MB exports parse without crashing the tab.
let _fflatePromise;
function loadFflate() {
  if (_fflatePromise) return _fflatePromise;
  _fflatePromise = new Promise((res, rej) => {
    if (window.fflate) return res(window.fflate);
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js';
    s.onload = () => window.fflate ? res(window.fflate) : rej(new Error('fflate load failed'));
    s.onerror = () => rej(new Error('Could not load unzip library — check internet'));
    document.head.appendChild(s);
  });
  return _fflatePromise;
}
function openAppleHealthImport() {
  openModal(`<header><h2>Apple Health import</h2><button class="close" onclick="closeModal()">Cancel</button></header>
    <p class="muted text-sm" style="margin:0 0 6px;line-height:1.5">On iPhone: <strong>Health app → your picture → Export All Health Data</strong>. AirDrop/save the <span class="kbd">export.zip</span>, then pick it here (the .zip directly is fine — no need to unzip).</p>
    <p class="muted text-sm" style="margin:0 0 12px">Imports weight, body fat %, resting HR, HRV, sleep, steps, SpO₂. Your Fitbit Air data flows in via Google Health → Apple Health sync. Manual entries are never overwritten.</p>
    <label>export.zip or export.xml</label>
    <input type="file" id="ah-file" accept=".zip,.xml,application/zip,text/xml" onchange="handleAppleHealthFile(event)" />
    <div id="ah-progress" style="margin-top:12px"></div>
    <div id="ah-preview" style="margin-top:8px"></div>`);
}
const AH_TYPES = {
  'HKQuantityTypeIdentifierBodyMass': 'weight',
  'HKQuantityTypeIdentifierBodyFatPercentage': 'bf',
  'HKQuantityTypeIdentifierRestingHeartRate': 'rhr',
  'HKQuantityTypeIdentifierHeartRateVariabilitySDNN': 'hrv',
  'HKQuantityTypeIdentifierStepCount': 'steps',
  'HKQuantityTypeIdentifierOxygenSaturation': 'spo2',
  'HKCategoryTypeIdentifierSleepAnalysis': 'sleep',
};
let AH_DATA = null;
function _ahAttr(tag, name) {
  const m = tag.match(new RegExp(name + '="([^"]*)"'));
  return m ? m[1] : null;
}
function _ahMakeParser() {
  // Accumulators
  const acc = {
    weight: {},            // date -> last kg
    bf: {},                // date -> last %
    rhr: {}, hrv: { sums:{}, counts:{} }, spo2: { sums:{}, counts:{} },
    steps: {},             // date -> { source -> sum }
    sleep: {},             // date(wake) -> seconds asleep
    counts: { weight:0, bf:0, rhr:0, hrv:0, steps:0, sleep:0, spo2:0 },
    minDate: null, maxDate: null,
  };
  let buffer = '';
  const decoder = new TextDecoder();
  function track(date) {
    if (!acc.minDate || date < acc.minDate) acc.minDate = date;
    if (!acc.maxDate || date > acc.maxDate) acc.maxDate = date;
  }
  function handleRecord(tag) {
    const type = _ahAttr(tag, 'type');
    const kind = AH_TYPES[type];
    if (!kind) return;
    const start = _ahAttr(tag, 'startDate');
    const end = _ahAttr(tag, 'endDate') || start;
    if (!start) return;
    const date = start.slice(0, 10);
    const value = parseFloat(_ahAttr(tag, 'value'));
    if (kind === 'sleep') {
      const v = _ahAttr(tag, 'value') || '';
      if (!/Asleep/i.test(v)) return;           // skip InBed / Awake
      const secs = (new Date(end) - new Date(start)) / 1000;
      if (!(secs > 0 && secs < 16*3600)) return;
      const wake = end.slice(0, 10);
      acc.sleep[wake] = (acc.sleep[wake] || 0) + secs;
      acc.counts.sleep++; track(wake);
      return;
    }
    if (isNaN(value)) return;
    if (kind === 'weight') {
      const unit = (_ahAttr(tag, 'unit') || '').toLowerCase();
      const kg = unit.includes('lb') ? lbToKg(value) : value;
      if (kg > 30 && kg < 250) { acc.weight[date] = kg; acc.counts.weight++; track(date); }
    } else if (kind === 'bf') {
      const pct = value <= 1 ? value * 100 : value;
      if (pct > 3 && pct < 60) { acc.bf[date] = pct; acc.counts.bf++; track(date); }
    } else if (kind === 'rhr') {
      if (value > 25 && value < 130) { acc.rhr[date] = value; acc.counts.rhr++; track(date); }
    } else if (kind === 'hrv') {
      if (value > 5 && value < 300) { acc.hrv.sums[date] = (acc.hrv.sums[date]||0) + value; acc.hrv.counts[date] = (acc.hrv.counts[date]||0) + 1; acc.counts.hrv++; track(date); }
    } else if (kind === 'spo2') {
      const pct = value <= 1 ? value * 100 : value;
      if (pct > 70 && pct <= 100) { acc.spo2.sums[date] = (acc.spo2.sums[date]||0) + pct; acc.spo2.counts[date] = (acc.spo2.counts[date]||0) + 1; acc.counts.spo2++; track(date); }
    } else if (kind === 'steps') {
      const src = _ahAttr(tag, 'sourceName') || 'unknown';
      if (value > 0 && value < 100000) {
        (acc.steps[date] = acc.steps[date] || {});
        acc.steps[date][src] = (acc.steps[date][src]||0) + value;
        acc.counts.steps++; track(date);
      }
    }
  }
  return {
    acc,
    feed(uint8, final) {
      buffer += decoder.decode(uint8 || new Uint8Array(), { stream: !final });
      let idx;
      const re = /<Record[^>]*?\/>/g;
      let lastEnd = 0, m;
      while ((m = re.exec(buffer)) !== null) { handleRecord(m[0]); lastEnd = re.lastIndex; }
      // keep the unparsed tail (a Record tag may straddle the chunk boundary)
      buffer = buffer.slice(Math.max(lastEnd, buffer.length - 65536));
      if (final) buffer = '';
    },
  };
}
async function handleAppleHealthFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const prog = document.getElementById('ah-progress');
  const isZip = /\.zip$/i.test(f.name) || f.type.includes('zip');
  const parser = _ahMakeParser();
  const totalMB = (f.size/1048576).toFixed(0);
  const setProgress = (done) => { prog.innerHTML = `<div class="row between" style="margin-bottom:5px"><span class="muted text-sm">Parsing ${isZip?'export.zip':'export.xml'} (${totalMB} MB)…</span><span class="muted text-sm num">${Math.round(done*100)}%</span></div><div class="progress"><span style="width:${done*100}%"></span></div>`; };
  setProgress(0);
  try {
    const CHUNK = 4 * 1048576;
    if (isZip) {
      const fflate = await loadFflate();
      let xmlFound = false;
      const unzipper = new fflate.Unzip();
      unzipper.register(fflate.UnzipInflate);
      unzipper.onfile = file => {
        if (!/(^|\/)export\.xml$/i.test(file.name)) return;
        xmlFound = true;
        file.ondata = (err, chunk, final) => { if (err) throw err; parser.feed(chunk, final); };
        file.start();
      };
      for (let off = 0; off < f.size; off += CHUNK) {
        const buf = new Uint8Array(await f.slice(off, off + CHUNK).arrayBuffer());
        unzipper.push(buf, off + CHUNK >= f.size);
        setProgress(Math.min(1, (off + CHUNK) / f.size));
        await new Promise(r => setTimeout(r, 0));   // yield to UI
      }
      if (!xmlFound) throw new Error('No export.xml found inside the zip — is this the Apple Health export?');
    } else {
      for (let off = 0; off < f.size; off += CHUNK) {
        const buf = new Uint8Array(await f.slice(off, off + CHUNK).arrayBuffer());
        parser.feed(buf, off + CHUNK >= f.size);
        setProgress(Math.min(1, (off + CHUNK) / f.size));
        await new Promise(r => setTimeout(r, 0));
      }
    }
    setProgress(1);
    AH_DATA = parser.acc;
    renderAppleHealthPreview();
  } catch (err) {
    prog.innerHTML = `<span style="color:var(--bad)">${err.message}</span>`;
  }
}
function renderAppleHealthPreview() {
  const acc = AH_DATA;
  const el = document.getElementById('ah-preview');
  const c = acc.counts;
  const total = Object.values(c).reduce((a,b)=>a+b,0);
  if (!total) { el.innerHTML = '<div class="empty">No usable records found. Make sure this is the full Apple Health export.</div>'; return; }
  const dayCount = obj => Object.keys(obj).length;
  el.innerHTML = `
    <div class="card" style="margin:0">
      <h3>Found · ${acc.minDate} → ${acc.maxDate}</h3>
      <div class="grid-3" style="margin-bottom:10px">
        ${c.weight?`<div class="tile"><div class="label">Weight</div><div class="value num" style="font-size:16px">${dayCount(acc.weight)}</div><div class="sub">days</div></div>`:''}
        ${c.bf?`<div class="tile"><div class="label">Body fat</div><div class="value num" style="font-size:16px">${dayCount(acc.bf)}</div><div class="sub">days</div></div>`:''}

async function confirmAppleHealthImport() {
  const acc = AH_DATA; if (!acc) return;
  const btn = event?.target; if (btn) { btn.disabled = true; btn.textContent = 'Importing…'; }
  const [weights, bio, steps] = await Promise.all([getAll('weights'), getAll('biometrics'), getAll('steps')]);
  const weightDates = new Set(weights.map(w => w.date));
  const bioByDate = {}; bio.forEach(b => { bioByDate[b.date] = b; });
  const stepDates = new Set(steps.map(s => s.date));
  let wN = 0, bN = 0, sN = 0;
  for (const [date, kg] of Object.entries(acc.weight)) {
    if (weightDates.has(date)) continue;             // manual/import wins
    await put('weights', { date, kg, source: 'apple' }); wN++;
  }
  const bioDates = new Set([
    ...Object.keys(acc.bf), ...Object.keys(acc.rhr), ...Object.keys(acc.hrv.sums),
    ...Object.keys(acc.sleep), ...Object.keys(acc.spo2.sums),
  ]);
  for (const date of bioDates) {
    const ent = bioByDate[date] || { date };
    let changed = false;
    if (acc.bf[date] != null && ent.bf_pct == null) { ent.bf_pct = Math.round(acc.bf[date]*10)/10; changed = true; }
    if (acc.rhr[date] != null && ent.rhr == null) { ent.rhr = Math.round(acc.rhr[date]); changed = true; }
    if (acc.hrv.sums[date] != null && ent.hrv_rmssd == null) { ent.hrv_rmssd = Math.round(acc.hrv.sums[date]/acc.hrv.counts[date]); changed = true; }
    if (acc.sleep[date] != null && ent.sleep_hours == null) { ent.sleep_hours = Math.round(acc.sleep[date]/360)/10; changed = true; }
    if (acc.spo2.sums[date] != null && ent.spo2 == null) { ent.spo2 = Math.round(acc.spo2.sums[date]/acc.spo2.counts[date]); changed = true; }
    if (changed) { await put('biometrics', ent); bN++; }
  }
  for (const [date, sources] of Object.entries(acc.steps)) {
    if (stepDates.has(date)) continue;
    const best = Math.round(Math.max(...Object.values(sources)));   // max source avoids double-counting phone+watch
    await put('steps', { date, count: best }); sN++;
  }
  toast(`✓ Apple Health: ${wN} weights · ${bN} biometric days · ${sN} step days`);
  fireConfetti(16);
  AH_DATA = null;
  closeModal();
  render();
}

async function handleImportFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const status = document.getElementById('i-status');
  const lower = f.name.toLowerCase();
  if (lower.endsWith('.pdf') || f.type === 'application/pdf') {
    status.textContent = `Reading PDF "${f.name}"…`;
    try {
      // 1. Try text extraction (works for text-based PDFs)
      let text = await extractPDFText(f);
      let csv = pdfTextToCSV(text);
      // 2. If no usable text, fall back to OCR (image-based PDFs like Fit Profile)
      if (!csv) {
        status.innerHTML = `No text in PDF — running OCR (this can take 20–60s, one-time download ~3 MB)…<br><span class="muted text-sm" id="ocr-progress">Loading OCR engine…</span>`;
        const ocrText = await runPDFOCR(f, msg => {
          const el = document.getElementById('ocr-progress');
          if (el) el.textContent = msg;
        });
        text = ocrText;
        csv = pdfTextToCSV(ocrText);
      }
      if (!csv) {
        status.innerHTML = `<span style="color:var(--bad)">Could not extract data from this PDF.</span><br><details style="margin-top:6px"><summary class="muted text-sm">View raw text</summary><pre style="font-size:11px;background:var(--bg-2);padding:8px;border-radius:6px;max-height:200px;overflow:auto;white-space:pre-wrap">${(text||'(empty)').slice(0,2000)}</pre></details>`;
        return;
      }
      document.getElementById('i-text').value = csv;
      status.textContent = `Extracted ${csv.split('\n').length - 1} row(s) from PDF ✓`;
      parseCSVText();
    } catch (err) {
      status.innerHTML = `<span style="color:var(--bad)">PDF read failed: ${err.message}</span>`;
    }
    return;
  }
  const r = new FileReader();
  r.onload = () => { document.getElementById('i-text').value = r.result; status.textContent = `Loaded ${f.name}`; parseCSVText(); };
  r.readAsText(f);
}

// -------- OCR (lazy-loaded Tesseract.js) --------
let _tessPromise;
function loadTesseract() {
  if (_tessPromise) return _tessPromise;
  _tessPromise = new Promise((res, rej) => {
    if (window.Tesseract) return res(window.Tesseract);
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
    s.onload = () => window.Tesseract ? res(window.Tesseract) : rej(new Error('Tesseract failed to load'));
    s.onerror = () => rej(new Error('Tesseract download failed — check internet'));
    document.head.appendChild(s);
  });
  return _tessPromise;
}
async function runPDFOCR(file, progress) {
  // Render every page of the PDF to a canvas, then OCR the canvas
  const pdfjs = await loadPDFJS();
  const Tesseract = await loadTesseract();
  if (progress) progress('Rendering PDF pages…');
  const buf = await file.arrayBuffer();
  const pdf = await pdfjs.getDocument({ data: buf }).promise;
  let allText = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    if (progress) progress(`Rendering page ${p}/${pdf.numPages}…`);
    const page = await pdf.getPage(p);
    const viewport = page.getViewport({ scale: 2 });   // higher scale → better OCR
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    if (progress) progress(`OCR page ${p}/${pdf.numPages}…`);
    const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
      logger: m => { if (m.status === 'recognizing text' && progress) progress(`OCR page ${p}: ${Math.round(m.progress*100)}%`); }
    });
    allText += text + '\n\n';
  }
  return allText;
}

// Lazy-load pdf.js when needed (CDN, no offline support for first PDF)
let _pdfjsPromise;
function loadPDFJS() {
  if (_pdfjsPromise) return _pdfjsPromise;
  _pdfjsPromise = new Promise((res, rej) => {
    if (window.pdfjsLib) return res(window.pdfjsLib);
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
    s.type = 'module';
    s.onload = () => {
      // pdfjsLib is exposed via the module's globalThis
      setTimeout(() => {
        if (window.pdfjsLib) {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
          res(window.pdfjsLib);
        } else {
          // Fallback: try the legacy non-module build
          const s2 = document.createElement('script');
          s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          s2.onload = () => {
            if (window.pdfjsLib) { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; res(window.pdfjsLib); }
            else rej(new Error('pdf.js failed to load'));
          };
          s2.onerror = () => rej(new Error('pdf.js failed to load'));
          document.head.appendChild(s2);
        }
      }, 100);
    };
    s.onerror = () => {
      // Try legacy non-module
      const s2 = document.createElement('script');
      s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s2.onload = () => {
        if (window.pdfjsLib) { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; res(window.pdfjsLib); }
        else rej(new Error('pdf.js failed to load'));
      };
      s2.onerror = () => rej(new Error('pdf.js failed to load — check internet'));
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  });
  return _pdfjsPromise;
}
async function extractPDFText(file) {
  const pdfjs = await loadPDFJS();
  const buf = await file.arrayBuffer();
  const pdf = await pdfjs.getDocument({ data: buf }).promise;
  let allText = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    // Group text items by y-coordinate to reconstruct rows
    const items = content.items.map(it => ({
      str: it.str,
      x: it.transform[4],
      y: Math.round(it.transform[5]),
    })).filter(i => i.str.trim());
    // Bucket items by Y
    const rows = {};
    items.forEach(i => { const key = Math.round(i.y / 6) * 6; (rows[key] = rows[key] || []).push(i); });
    const sortedRows = Object.keys(rows).sort((a,b) => b - a);
    for (const k of sortedRows) {
      const row = rows[k].sort((a,b) => a.x - b.x).map(i => i.str).join(' ').trim();
      if (row) allText += row + '\n';
    }
    allText += '\n';
  }
  return allText;
}

// Convert extracted PDF text (raw or OCR'd) into a CSV string for the existing parser.
function pdfTextToCSV(text) {
  if (!text || !text.trim()) return null;
  const lines = text.split('\n');

  // Strategy 1: columnar CSV-like table with "Date" header
  const headerIdx = lines.findIndex(l => /date/i.test(l) && /weight|wt|kg|lb/i.test(l));
  if (headerIdx !== -1) {
    const out = [lines[headerIdx]];
    for (let i = headerIdx + 1; i < Math.min(headerIdx + 200, lines.length); i++) {
      const l = lines[i].trim();
      if (!l) continue;
      if (parseDate(l.split(/\s|,/)[0])) out.push(l.replace(/\s+/g, ','));
    }
    if (out.length > 1) return out.join('\n');
  }

  // Strategy 2: Fit Profile / Body Composition Analysis (single report or OCR'd)
  // The whole document is one reading. Use specific patterns that are tolerant of
  // OCR artifacts and table-spanning layouts.
  const full = text.replace(/\s+/g, ' ');
  const result = {};

  // Date — looks like "05/01/2026" or "2026-05-01"
  const dateRe = /(\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/;
  const dMatch = full.match(dateRe);
  if (dMatch) { const d = parseDate(dMatch[1]); if (d) result.date = d; }

  // OCR commonly reads "lb" as "Ib" (capital i + b). Make matching tolerant.
  const LB = '(?:l\\s?b|I\\s?b|1b)';

  // Weight — Muscle Fat Analysis row has format:
  // "Weight (lb) 56 85 115 145 175 205%\n(Ib) i 152.8"
  // Strategy: find "Weight" then the first plausible decimal number (50-400) within 250 chars.
  const wMatch = full.match(new RegExp(`Weight[\\s\\S]{0,250}?\\b(\\d{2,3}\\.\\d{1,2})\\b`, 'i'));
  if (wMatch) {
    const n = parseFloat(wMatch[1]);
    if (n >= 50 && n <= 500) result.weight = wMatch[1];
  }
  // Body Fat Mass — "Body Fat Mass (lb) 24.4" but OCR may garble (lb)
  const bfmMatch = full.match(new RegExp(`Body\\s*Fat\\s*Mass[\\s\\S]{0,80}?(\\d+\\.?\\d*)`, 'i'));
  if (bfmMatch) {
    const n = parseFloat(bfmMatch[1]);
    if (n > 0 && n < 200) result.body_fat_mass_lb = bfmMatch[1];
  }
  // LBM / Fat-free Body Weight
  const lbmMatch = full.match(new RegExp(`(?:LBM|Fat[-\\s]?free\\s*Body[\\s\\w]*?)\\s*(\\d+\\.?\\d*)\\s*${LB}`, 'i'));
  if (lbmMatch) result.lbm_lb = lbmMatch[1];
  // If no direct weight but we have LBM + BFM, derive
  if (!result.weight && result.lbm_lb && result.body_fat_mass_lb) {
    result.weight = (parseFloat(result.lbm_lb) + parseFloat(result.body_fat_mass_lb)).toFixed(1);
  }

  // PBF (Body Fat Percentage) — "PBF(%) ... 16" or "Body Fat Percentage ... 16"
  const pbfMatch = full.match(/PBF\s*\(?\s*%\s*\)?\s*([\s\S]{0,80}?)(\d+\.?\d*)\s*(?:6~25|0~|10\b)/i)
    || full.match(/Body\s*Fat\s*Percentage[\s\S]{0,80}?(\d+\.\d|\d{1,2})\s*%/i);
  if (pbfMatch) {
    result.bf = pbfMatch[2] || pbfMatch[1];
    // Sanity: BF should be 5-50
    const n = parseFloat(result.bf);
    if (isNaN(n) || n < 4 || n > 60) {
      // Try a looser pattern: find a 1-2 digit number after PBF
      const alt = full.match(/PBF[\s\S]{0,160}?\b(\d{1,2}(?:\.\d)?)\b\s*(?:6~25|6 ~ 25)/i);
      if (alt) result.bf = alt[1]; else delete result.bf;
    }
  }
  // Derive BF% from BFM and weight if not directly extracted
  if (!result.bf && result.body_fat_mass_lb && result.weight) {
    const bf = (parseFloat(result.body_fat_mass_lb) / parseFloat(result.weight)) * 100;
    if (bf > 4 && bf < 60) result.bf = bf.toFixed(1);
  }

  // Skeletal Muscle in lb — "Skeletal Muscle ... 82.8 lb" or "Skeletal Mu scle (lb) ... 82.8"
  // Find LAST decimal number after the label (skipping axis ticks)
  const smChunk = full.match(/Skeletal[\s\w]*?Mu[\s\w]*?scle[\s\S]{0,200}/i);
  if (smChunk) {
    // pick a number in plausible range 20-200
    const nums = [...smChunk[0].matchAll(/(\d+\.\d{1,2})/g)].map(m => parseFloat(m[1])).filter(n => n >= 20 && n <= 200);
    if (nums.length) result.muscle = nums[0].toString();
  }

  // Body Water (L)
  const bwMatch = full.match(/Body\s*Water[\s\S]{0,80}?(\d+\.?\d*)/i);
  if (bwMatch) result.water_l = bwMatch[1];

  // Bone Mass (lb)
  const boneMatch = full.match(/Bone\s*Mass[\s\S]{0,80}?(\d+\.?\d*)/i);
  if (boneMatch) result.bone_lb = boneMatch[1];

  // BMI — "BMI ... 24" inside the Fat Analysis table
  const bmiMatch = full.match(/\bBMI[\s\S]{0,140}?(\d+\.?\d*)\s*(?:18\.5\s*~\s*25|18\.?5)/i)
    || full.match(/\bBMI[\s\S]{0,40}?(\d+\.?\d*)/i);
  if (bmiMatch) {
    const n = parseFloat(bmiMatch[1]);
    if (n >= 10 && n <= 60) result.bmi = bmiMatch[1];
  }

  // Visceral Fat — skip axis labels ("Under 10 Over"), capture the actual value after "Over"
  // OCR may render as "Vi iFat Uncer 10 Over\n«6"
  const vfChunk = full.match(/Vi[\s\w]*?Fat[\s\S]{0,200}/i);
  if (vfChunk) {
    // Try: after "Over", find next 1-2 digit number that's not 10
    const afterOver = vfChunk[0].match(/Over[\s\S]{0,40}?\W*(\d{1,2})\b/i);
    if (afterOver && parseInt(afterOver[1]) !== 10) result.visceral = afterOver[1];
    else {
      // Fall back: find any number 1-30 in the chunk that's not 10 (the axis threshold)
      const nums = [...vfChunk[0].matchAll(/\b(\d{1,2})\b/g)].map(m => parseInt(m[1])).filter(n => n >= 1 && n <= 30 && n !== 10);
      if (nums.length) result.visceral = nums[0].toString();
    }
  }

  // BMR — "Basal Metabolic 1627 kcal"
  const bmrMatch = full.match(/(?:BMR|Basal\s*Metabolic)[\s\S]{0,60}?(\d{3,5})\s*k?cal/i);
  if (bmrMatch) result.bmr = bmrMatch[1];

  // Subcutaneous Fat %
  const scMatch = full.match(/Subcutaneous\s*Fat[\s\S]{0,80}?(\d+\.?\d*)\s*%/i);
  if (scMatch) result.subcutaneous = scMatch[1];

  // Metabolic Age
  const maMatch = full.match(/Metabolic\s*Age[\s\S]{0,40}?(\d+)/i);
  if (maMatch) result.metabolic_age = maMatch[1];

  // RHR (if present)
  const rhrMatch = full.match(/(?:resting\s*hr|\bRHR\b)[\s\S]{0,30}?(\d{2,3})/i);
  if (rhrMatch) result.rhr = rhrMatch[1];

  // Default date to today if missing but we have measurements
  if (!result.date && (result.weight || result.bf || result.muscle)) {
    result.date = today();
  }
  if (!result.date) return null;

  // Convert Body Water from liters → % using weight (Fit Profile reports L, app stores %)
  let waterPct = '';
  if (result.water_l && result.weight) {
    const weightKg = parseFloat(result.weight) * 0.453592;  // lb → kg
    const pct = parseFloat(result.water_l) / weightKg * 100;
    if (pct > 30 && pct < 80) waterPct = pct.toFixed(1);
  }

  // Build a CSV row with all extracted fields
  const header = 'Date,Weight (lb),Body Fat,Muscle Mass (lb),Body Water,Visceral,BMI,Bone Mass (lb)';
  const row = [
    result.date,
    result.weight || '',
    result.bf || '',
    result.muscle || '',
    waterPct,
    result.visceral || '',
    result.bmi || '',
    result.bone_lb || ''
  ].join(',');
  // Only return if we got at least 2 useful fields
  const filled = [result.weight, result.bf, result.muscle, result.bmr, result.water_l].filter(Boolean).length;
  if (filled < 2) return null;
  return header + '\n' + row;
}
let IMPORT_PARSED;
function parseCSVText() {
  const text = document.getElementById('i-text').value.trim();

  const delim = firstLine.includes('\t') ? '\t' : firstLine.includes(';') ? ';' : ',';
  const rows = text.split(/\r?\n/).filter(r => r.trim()).map(r => r.split(delim).map(c => c.trim().replace(/^"|"$/g, '')));
  if (rows.length < 2) { toast('Need header + at least 1 row'); return; }

  const dataRows = rows.slice(1);
  // Map common column names
  const colMap = {
    date: ['date','day','timestamp','time','datum'],
    weight: ['weight','wt','weight (kg)','weight (lb)','weight(kg)','weight(lb)','peso','gewicht','kg','lb'],
    bf_pct: ['body fat','bf','bf%','body fat %','bodyfat','fat%','fat percent','fat'],
    muscle: ['muscle','muscle mass','skeletal muscle','muscle (kg)','muscle (lb)','muscle mass (lb)','muscle mass (kg)','sm'],
    water: ['water','body water','water%','water percent'],
    visceral: ['visceral','visceral fat','visceral rating'],
    bone: ['bone','bone mass','bone (kg)','bone mass (lb)','bone mass (kg)'],
    bmi: ['bmi'],
    rhr: ['resting heart rate','rhr','resting hr','heart rate (rest)'],
    hrv: ['hrv','rmssd','hrv (rmssd)','heart rate variability'],
    sleep: ['sleep','sleep hours','hours asleep','sleep duration','time asleep'],
    steps: ['steps','step count','daily steps'],
    spo2: ['spo2','spo₂','oxygen saturation','oxygen'],
    bmr: ['bmr','basal metabolic rate','basal metabolic'],
    metabolic_age: ['metabolic age'],
    subcutaneous_fat_pct: ['subcutaneous','subcutaneous fat','subcutaneous fat %'],
  };
  const idx = {};
  for (const [k, names] of Object.entries(colMap)) {
    for (const n of names) {
      const i = header.indexOf(n);
      if (i !== -1) { idx[k] = i; break; }
    }
  }
  if (idx.date == null) { toast('No date column found'); return; }
  // Detect weight unit: if header explicitly says lb → lb, else metric (kg). If any val > 150 likely lb.
  const headerJoined = header.join(' ');
  const weightInLb = headerJoined.includes('(lb)') || headerJoined.includes(' lb') ||
    (idx.weight != null && dataRows.length && parseFloat(dataRows[0][idx.weight]) > 130);

  const parsed = [];
  for (const r of dataRows) {
    const dRaw = r[idx.date]; if (!dRaw) continue;
    const date = parseDate(dRaw);
    if (!date) continue;
    const rec = { date };
    if (idx.weight != null && r[idx.weight]) {
      const w = parseFloat(r[idx.weight]);
      if (!isNaN(w)) rec.kg = weightInLb ? lbToKg(w) : w;
    }
    for (const [k, label] of [['bf_pct','bf_pct'],['water_pct','water'],['visceral_fat','visceral'],['rhr','rhr'],['hrv_rmssd','hrv'],['sleep_hours','sleep'],['spo2','spo2'],['bmi','bmi'],['bmr','bmr'],['metabolic_age','metabolic_age'],['subcutaneous_fat_pct','subcutaneous_fat_pct']]) {
      if (idx[label] != null && r[idx[label]]) { const v = parseFloat(r[idx[label]]); if (!isNaN(v)) rec[k] = v; }
    }
    if (idx.muscle != null && r[idx.muscle]) { const v = parseFloat(r[idx.muscle]); if (!isNaN(v)) rec.muscle_mass_kg = weightInLb ? lbToKg(v) : v; }
    if (idx.bone != null && r[idx.bone]) { const v = parseFloat(r[idx.bone]); if (!isNaN(v)) rec.bone_mass_kg = weightInLb ? lbToKg(v) : v; }
    if (idx.steps != null && r[idx.steps]) { const v = parseInt(r[idx.steps]); if (!isNaN(v)) rec.steps = v; }
    parsed.push(rec);
  }
  IMPORT_PARSED = parsed;
  document.getElementById('i-preview').innerHTML = `
    <div class="card" style="margin:0">
      <h3>Preview · ${parsed.length} rows</h3>
      <div class="muted text-sm" style="margin-bottom:8px">Detected columns: ${Object.keys(idx).join(', ')} · weight unit: ${weightInLb ? 'lb→kg' : 'kg'}</div>
      <div style="max-height:200px;overflow-y:auto">
        ${parsed.slice(0,12).map(r => `<div class="list-row"><div><div class="name">${fmt.dateNice(r.date)}</div><div class="sub num">${[r.kg?fmt.weight(r.kg):'', r.bf_pct?fmt.num(r.bf_pct,1)+'%':'', r.muscle_mass_kg?'M '+fmt.weight(r.muscle_mass_kg):'', r.rhr?'RHR '+r.rhr:'', r.steps?r.steps+' steps':''].filter(Boolean).join(' · ')}</div></div></div>`).join('')}
        ${parsed.length > 12 ? `<div class="muted text-sm" style="margin-top:8px">... + ${parsed.length-12} more</div>` : ''}
      </div>
      <div style="height:12px"></div>
      <button class="btn full gradient" onclick="confirmImport()">Import ${parsed.length} rows</button>
    </div>`;
}
function parseDate(s) {
  // Try ISO first
  let d = new Date(s);
  if (!isNaN(d)) return fmt.date(d);
  // Try US format MM/DD/YYYY
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m) {
    let [_, mm, dd, yy] = m;
    if (yy.length === 2) yy = '20' + yy;
    return `${yy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
  }
  return null;
}
async function confirmImport() {
  let weightCount = 0, bioCount = 0, stepCount = 0;
  for (const r of IMPORT_PARSED) {
    if (r.kg != null) {
      const all = await getAll('weights');
      const ex = all.find(w => w.date === r.date && w.source === 'import');
      if (ex) { ex.kg = r.kg; await put('weights', ex); }
      else await put('weights', { date: r.date, kg: r.kg, source: 'import' });
      weightCount++;
    }
    const bioFields = ['bf_pct','water_pct','visceral_fat','rhr','hrv_rmssd','sleep_hours','spo2','muscle_mass_kg','bone_mass_kg','bmi','bmr','metabolic_age','subcutaneous_fat_pct'];
    const hasBio = bioFields.some(f => r[f] != null);
    if (hasBio) {
      const bioAll = await getAll('biometrics');
      let ent = bioAll.find(b => b.date === r.date) || { date: r.date };
      bioFields.forEach(f => { if (r[f] != null) ent[f] = r[f]; });
      await put('biometrics', ent);
      bioCount++;
    }
    if (r.steps != null) {
      const sAll = await getAll('steps');
      let s = sAll.find(x => x.date === r.date) || { date: r.date };
      s.count = r.steps;
      await put('steps', s);
      stepCount++;
    }
  }
  toast(`Imported: ${weightCount} weights, ${bioCount} biometrics, ${stepCount} step entries`);
  closeModal();
  render();
}

// -------- Training heatmap (90-day) --------
async function renderTrainingHeatmap() {
  const workouts = await getAll('workouts');
  // Build a map: date → set count
  const setCount = {};
  for (const w of workouts) {
    const sets = (w.logged_sets || []).filter(s => !s.kind && s.type !== 'w').length;
    const cardio = (w.logged_sets || []).filter(s => s.kind === 'cardio').length;
    setCount[w.date] = sets + cardio * 4;   // count cardio as 4 set-equivalents for intensity coloring
  }
  // Build 90-day grid starting from 13 weeks ago aligned to Monday
  const todayDate = new Date();
  const dow = todayDate.getDay(); // 0=Sun
  const todayMonday = new Date(todayDate); todayMonday.setDate(todayDate.getDate() - (dow === 0 ? 6 : dow - 1));
  const startMonday = new Date(todayMonday); startMonday.setDate(todayMonday.getDate() - 12 * 7);
  let cells = '';
  for (let week = 0; week < 13; week++) {
    let column = '';
    for (let day = 0; day < 7; day++) {
      const d = new Date(startMonday); d.setDate(startMonday.getDate() + week * 7 + day);
      const dStr = fmt.date(d);
      const sets = setCount[dStr] || 0;
      let lvl = 0;
      if (sets > 0) lvl = 1;
      if (sets >= 8) lvl = 2;
      if (sets >= 16) lvl = 3;
      const isFuture = d > todayDate;
      column += `<div class="hm-cell hm-${isFuture?'future':lvl}" title="${fmt.dateNice(dStr)}: ${sets} sets"></div>`;
    }
    cells += `<div class="hm-col">${column}</div>`;
  }
  return `<div class="hm-grid">${cells}</div>`;
}

async function deleteProfile(profileId) {
  if (!confirm('Delete this profile + all its data? This cannot be undone.')) return;
  // Delete the profile + all scoped data
  await del('profile', profileId);
  for (const store of PROFILE_SCOPED_STORES) {
    const all = await getAllRaw(store);
    for (const r of all) if (r.profile_id === profileId) await del(store, r.id);
  }
  // If we deleted the active one, switch to another or empty
  if (ACTIVE_PROFILE_ID === profileId) {
    const remaining = await getAllProfiles();
    if (remaining.length) await setActiveProfile(remaining[0].id);
    else { ACTIVE_PROFILE_ID = null; ONB_STEP = 0; ONB_DATA = { unit_system: 'imperial' }; }
  }
  toast('Profile deleted');

  render();
}

// Animated number count-up for hero stats
function tickNumber(el) {
  if (!el) return;
  const target = parseFloat(el.dataset.target);
  if (isNaN(target) || target <= 0) return;
  const dur = 600, t0 = performance.now();
  function step(t) {
    const k = Math.min(1, (t - t0) / dur);
    const eased = 1 - Math.pow(1 - k, 3);
    el.textContent = Math.round(target * eased);
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

const APP_VERSION = '2026-06-10-b';
if ('serviceWorker' in navigator && navigator.serviceWorker) {
  window.addEventListener('load', async () => {
    try {
      // If the stored app version differs from the running one, force-refresh SW + caches.
      const stored = localStorage.getItem('lean_app_ver');
      if (stored !== APP_VERSION) {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.update()));
          if (window.caches) {
            const keys = await caches.keys();
            // Keep persistent runtime caches (exercise images, CDN libs) across app versions
            await Promise.all(keys.filter(k => !k.includes(APP_VERSION) && !k.startsWith('lean-img') && !k.startsWith('lean-lib')).map(k => caches.delete(k)));
          }
          localStorage.setItem('lean_app_ver', APP_VERSION);
        } catch (e) {}
      }
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    } catch (e) {}
  });
}

// -------- 18. Boot (with visible error fallback) --------
function showFatalError(err) {
  const view = document.getElementById('view');
  if (!view) return;
  view.innerHTML = `
    <div class="card">
      <h3>App couldn't start</h3>
      <p class="muted text-sm">Something went wrong loading your data. Details below — if this persists, tap "Reset app" to clear cached files and try again.</p>
      <pre style="background:var(--bg-2);padding:10px;border-radius:8px;overflow:auto;font-size:11px;color:var(--bad);white-space:pre-wrap">${String(err && err.stack || err)}</pre>
      <div style="height:10px"></div>
      <button class="btn full secondary" onclick="leanReset()">Reset app (clear caches, keep IndexedDB data)</button>
      <div style="height:6px"></div>
      <button class="btn full danger" onclick="if(confirm('Erase ALL local data and reload?')){leanResetHard()}">Erase everything + reload</button>
    </div>
    <div class="card">
      <h3>Version</h3>
      <div class="muted text-sm">App ${APP_VERSION}</div>
    </div>`;
}
async function leanReset() {
  try {
    if ('serviceWorker' in navigator) { const regs = await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r => r.unregister())); }
    if (window.caches) { const keys = await caches.keys(); await Promise.all(keys.map(k => caches.delete(k))); }
    localStorage.removeItem('lean_app_ver');
  } catch (e) {}
  location.reload();
}
async function leanResetHard() {
  try { indexedDB.deleteDatabase('lean-db'); } catch (e) {}
  await leanReset();
}
// Watchdog: if 5s pass without any render replacing the boot-msg, show diagnostic.
let _bootDone = false;
setTimeout(() => {
  if (_bootDone) return;
  const bm = document.getElementById('boot-msg');
  if (bm) showFatalError(new Error('Boot did not complete within 5s.\n\nMost common cause: another browser tab has this app open and is blocking the IndexedDB upgrade. Close all other Lean tabs and tap "Reset app" below.\n\nOther causes:\n• Browser blocks IndexedDB on file:// URLs (try Chrome with --allow-file-access-from-files, or serve via a local web server)\n• Stale service worker — tap "Reset app"\n\nTo see the real error: open DevTools (Cmd+Opt+I on Mac), go to Console tab.'));
}, 5000);

(async function boot() {
  try {
    await openDB();
    applyTheme(await getSetting('theme', 'auto'));
    try { await applyStapleMicroCache(); } catch (e) {}
    try { await loadCustomPrograms(); } catch (e) {}
    // Ask the browser to never evict our data (auto-granted for installed PWAs)
    try { if (navigator.storage && navigator.storage.persist) navigator.storage.persist(); } catch (e) {}
    const profiles = await getAllRaw('profile');
    if (profiles.length === 1 && !profiles[0].active) {
      // Migrate: mark the single existing profile as active + backfill profile_id
      profiles[0].active = true;
      await put('profile', profiles[0]);
      ACTIVE_PROFILE_ID = profiles[0].id;
      await migrateExistingDataToProfile(profiles[0].id);
    } else if (profiles.length > 1) {
      const active = profiles.find(p => p.active) || profiles[0];
      ACTIVE_PROFILE_ID = active.id;
    } else if (profiles.length === 1) {
      ACTIVE_PROFILE_ID = profiles[0].id;
    }
    const p = await getProfile();
    if (p) { UNITS = p.unit_system || 'imperial'; _activeProgram = PROGRAMS[p.program_id] || CUSTOM_PROGRAMS[p.program_id] || PROGRAMS[DEFAULT_PROGRAM]; }
    _bootDone = true;
    try { await handleSpotifyCallback(); } catch (e) {}
    try { if (p && p.onboarded) await handleHashData(); } catch (e) {}
    route('today');
  } catch (err) {
    _bootDone = true;
    console.error('Boot failed:', err);
    showFatalError(err);
  }
})();
</script>
